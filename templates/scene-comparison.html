<!-- HTML -->
<div id="scene-compare" class="scene" data-duration="7">
  <div class="anim compare-title" data-delay="0" data-dur="0.5">
    方案对比
  </div>
  <div class="anim compare-container" data-delay="0.4" data-dur="0.5">
    <div class="compare-side compare-bad">
      <div class="compare-label">❌ 传统方案</div>
      <ul class="compare-list">
        <li>学习成本高</li>
        <li>耗时3-7天</li>
        <li>依赖付费软件</li>
      </ul>
    </div>
    <div class="compare-side compare-good">
      <div class="compare-label">✅ 本方案</div>
      <ul class="compare-list">
        <li>前端即可上手</li>
        <li>2分钟出片</li>
        <li>完全免费开源</li>
      </ul>
    </div>
  </div>
</div>
