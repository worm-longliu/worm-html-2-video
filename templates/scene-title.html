<!-- HTML -->
<!-- 字幕数据: 写入 scenes/scene-N.html 的 SUBTITLES 数组(局部 0 起算时间轴),截图时自动捕获
     文本与 voiceover_text.txt 文案对齐, 格式 { start, end, text }(start/end 为该场景内秒数)
     例如: { start: 0.3, end: 3.7, text: "标题文案" } -->
<div id="scene-title" class="scene" data-duration="4">
  <div class="anim title-ring" data-delay="0" data-dur="0.5">
    <div class="title-ring-icon">💡</div>
  </div>
  <div class="anim title-main" data-delay="0.3" data-dur="0.5">
    主标题文字<br><span class="green">副标题高亮</span>
  </div>
  <div class="anim title-badge" data-delay="0.8" data-dur="0.5">
    ⚡ 标签文字
  </div>
</div>
