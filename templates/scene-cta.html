<!-- HTML -->
<!-- 字幕数据: 写入 scenes/scene-N.html 的 SUBTITLES 数组(局部 0 起算时间轴),截图时自动捕获
     文本与 voiceover_text.txt 文案对齐, 格式 { start, end, text }(start/end 为该场景内秒数)
     例如: { start: 0.3, end: 3.7, text: "标题文案" } -->
<div id="scene-cta" class="scene" data-duration="6">
  <div class="anim cta-logo" data-delay="0" data-dur="0.5">
    项目名称
  </div>
  <div class="anim cta-title" data-delay="0.4" data-dur="0.5">
    开源免费<br>人人可用
  </div>
  <div class="anim cta-github" data-delay="0.9" data-dur="0.5">
    GitHub: <span class="hl">username/repo-name</span>
  </div>
  <div class="anim cta-button" data-delay="1.4" data-dur="0.5">
    关注我，下集见！
  </div>
</div>
