<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>worm-html-2-video 项目介绍 - 场景导航</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: radial-gradient(ellipse at 50% 18%, #161B30 0%, #0B0E1A 70%);
  color: #F5F7FF; -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
}
.glow { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; z-index: 0; }
.glow.amber { width: 520px; height: 520px; background: #FFB347; top: 8%; left: -120px; }
.glow.cyan { width: 460px; height: 460px; background: #5EE7FF; bottom: 6%; right: -100px; opacity: 0.28; }
.eyebrow { font-family: "Bricolage Grotesque", sans-serif; font-size: 26px; font-weight: 600;
  letter-spacing: 0.4em; color: #FFB347; text-transform: uppercase; margin-bottom: 28px; z-index: 1; }
h1 { font-family: "Bricolage Grotesque", "Noto Sans SC", sans-serif; font-size: 76px; font-weight: 800;
  line-height: 1.12; text-align: center; margin-bottom: 18px; z-index: 1;
  background: linear-gradient(180deg, #FFFFFF 0%, #C9D2F0 100%); -webkit-background-clip: text;
  background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 30px; color: #AEB8D8; margin-bottom: 56px; text-align: center; line-height: 1.6; z-index: 1; }
.hint { font-size: 26px; color: #5EE7FF; margin-bottom: 44px; text-align: center; line-height: 1.6; z-index: 1; }
ol { font-size: 34px; line-height: 1.95; list-style: none; z-index: 1; width: 620px; counter-reset: s; }
ol li { counter-increment: s; display: flex; align-items: center; }
ol li::before { content: counter(s, decimal-leading-zero); font-family: "Bricolage Grotesque", monospace;
  font-size: 22px; font-weight: 600; color: #FFB347; width: 70px; }
ol a { color: #F5F7FF; text-decoration: none; flex: 1; }
ol a:hover { color: #FFB347; }
</style>
</head>
<body>
<div class="glow amber"></div>
<div class="glow cyan"></div>
<div class="eyebrow">PROJECT INTRO</div>
<h1>worm-html-2-video<br>项目介绍</h1>
<div class="sub">用 HTML 就能做抖音竖屏视频</div>
<div class="hint">← → 切换场景 | 空格播放配音预览<br>共 8 个场景</div>
<ol><li><a href="scene-1.html">开场 Hook</a></li>
<li><a href="scene-2.html">痛点对比</a></li>
<li><a href="scene-3.html">帧驱动引擎</a></li>
<li><a href="scene-4.html">六步流水线</a></li>
<li><a href="scene-5.html">核心特性</a></li>
<li><a href="scene-6.html">效率对比</a></li>
<li><a href="scene-7.html">技术亮点</a></li>
<li><a href="scene-8.html">结尾 CTA</a></li></ol>
<script>
const TOTAL = 8;
function gotoScene(i) { if (i < 1 || i > TOTAL) return; location.href = 'scene-' + i + '.html'; }
let _cur = 1;
document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowRight') { _cur = Math.min(_cur + 1, TOTAL); }
  else if (e.code === 'ArrowLeft') { _cur = Math.max(_cur - 1, 1); }
  else if (e.code === 'Space') { e.preventDefault(); gotoScene(1); return; }
  else if (e.key >= '1' && e.key <= '9') { gotoScene(parseInt(e.key)); return; }
  else return;
  gotoScene(_cur);
});
</script>
</body>
</html>
