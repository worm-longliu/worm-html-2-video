<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>worm-html-2-video 项目介绍 - 场景3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-0: #0B0E1A; --bg-1: #161B30;
  --amber: #FFB347; --amber-bright: #FFD56B;
  --cyan: #5EE7FF; --violet: #B14DFF;
  --text: #F5F7FF; --text-sub: #C9D2F0; --text-dim: #AEB8D8;
  --glass-border: rgba(255,255,255,0.14);
}
body { width: 1080px; height: 1920px; overflow: hidden; position: relative;
  background: radial-gradient(ellipse at 50% 20%, #0F1830 0%, #0B0E1A 70%);
  font-family: "Noto Sans SC","Microsoft YaHei",sans-serif; -webkit-font-smoothing: antialiased; }
.grid-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.18;
  background-image: linear-gradient(rgba(94,231,255,0.25) 1px, transparent 1px),
    linear-gradient(90deg, rgba(94,231,255,0.25) 1px, transparent 1px);
  background-size: 60px 60px; }
.scene { position: absolute; inset: 0; padding: 150px 70px 280px; display: flex; flex-direction: column; z-index: 1; }
.anim { opacity: 0; transform: translateY(30px); }
.eyebrow { font-family: "Bricolage Grotesque",sans-serif; font-size: 26px; font-weight: 600;
  letter-spacing: 0.35em; color: var(--cyan); text-transform: uppercase; margin-bottom: 22px; }
.s3-title { font-family: "Bricolage Grotesque","Noto Sans SC",sans-serif; font-size: 62px; font-weight: 800;
  line-height: 1.15; color: var(--text); margin-bottom: 20px; }
.s3-title em { font-style: normal; color: var(--cyan); }
.s3-sub { font-size: 30px; color: var(--text-dim); margin-bottom: 60px; line-height: 1.5; }
.s3-frames { display: flex; gap: 22px; margin-bottom: 50px; }
.frame { flex: 1; aspect-ratio: 1 / 1.3; border-radius: 18px; border: 2px solid rgba(94,231,255,0.3);
  background: rgba(94,231,255,0.06); display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; position: relative; overflow: hidden; }
.frame .idx { font-family: "JetBrains Mono",monospace; font-size: 30px; font-weight: 700; color: var(--cyan); }
.frame .dot { width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 16px var(--cyan); }
.frame.active { border-color: var(--amber); background: rgba(255,179,71,0.12);
  box-shadow: 0 0 28px rgba(255,179,71,0.4); }
.frame.active .idx { color: var(--amber-bright); }
.frame.active .dot { background: var(--amber-bright); box-shadow: 0 0 18px var(--amber-bright); }
.s3-progress { width: 100%; height: 14px; border-radius: 8px; background: rgba(255,255,255,0.08);
  overflow: hidden; margin-bottom: 70px; position: relative; }
.s3-progress .bar { height: 100%; width: 60%; border-radius: 8px;
  background: linear-gradient(90deg, var(--cyan), var(--amber)); box-shadow: 0 0 16px rgba(255,179,71,0.5); }
.s3-pipe { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.pipe-node { padding: 20px 30px; border-radius: 16px; font-family: "JetBrains Mono",monospace;
  font-size: 30px; font-weight: 700; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04);
  color: var(--text); }
.pipe-node.gold { border-color: var(--amber); color: var(--amber-bright); background: rgba(255,179,71,0.1); }
.pipe-arrow { font-family: "Bricolage Grotesque",sans-serif; font-size: 36px; color: var(--text-dim); }
.subtitle-bar { position: absolute; left: 60px; right: 60px; bottom: 100px; min-height: 80px;
  padding: 22px 36px; background: rgba(0,0,0,0.78); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 18px; color: #FFFFFF; font-size: 44px; font-weight: 600;
  line-height: 1.4; text-align: center; z-index: 9999; opacity: 0; transition: opacity 0.12s linear;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
  white-space: pre-line; word-break: break-word; }
.debug-hint { position: absolute; top: 12px; left: 12px; z-index: 10000; font-size: 20px; color: var(--cyan);
  background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 8px; pointer-events: none; }
</style>
</head>
<body>
<div class="debug-hint">场景 3/8 | ← → 切换 | 空格播放配音</div>
<div class="grid-bg"></div>
<div id="subtitle-bar" class="subtitle-bar"></div>
<audio id="vo" src="voiceover_scene_3.mp3" preload="auto"></audio>
<div id="scene-3" class="scene" data-duration="11.112">
  <div class="anim eyebrow" data-delay="0" data-dur="0.5">FRAME ENGINE</div>
  <div class="anim s3-title" data-delay="0.4" data-dur="0.6">帧驱动<em>动画系统</em></div>
  <div class="anim s3-sub" data-delay="1.0" data-dur="0.5">精确到每一帧 · 5 fps 采集 · 30 fps 输出</div>
  <div class="anim s3-frames" data-delay="1.6" data-dur="0.6">
    <div class="frame active"><div class="dot"></div><div class="idx">F1</div></div>
    <div class="frame active"><div class="dot"></div><div class="idx">F2</div></div>
    <div class="frame active"><div class="dot"></div><div class="idx">F3</div></div>
    <div class="frame"><div class="dot"></div><div class="idx">F4</div></div>
    <div class="frame"><div class="dot"></div><div class="idx">F5</div></div>
  </div>
  <div class="anim s3-progress" data-delay="2.4" data-dur="0.5"><div class="bar"></div></div>
  <div class="anim s3-pipe" data-delay="3.0" data-dur="0.6">
    <div class="pipe-node">HTML</div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-node gold">PNG</div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-node gold">MP4</div>
  </div>
</div>
<script>
const FPS = 30;
const SCENE_FADE_FRAMES = 8;
const SCENE_ID = 3;
const SCENE_TOTAL = 8;
const SUBTITLES = [
  { "start": 0.3, "end": 3.2, "text": "帧驱动动画系统" },
  { "start": 3.2, "end": 6.0, "text": "精确到每一帧" },
  { "start": 6.0, "end": 8.8, "text": "5 fps 采集，30 fps 输出" },
  { "start": 8.8, "end": 11.0, "text": "HTML → PNG → MP4 编码" }
];
const subtitleBar = document.getElementById('subtitle-bar');
let _lastSub = null;
function updateSubtitle(time) {
  let active = null;
  for (const sub of SUBTITLES) { if (time >= sub.start && time < sub.end) { active = sub; break; } }
  if (active) {
    if (active.text !== _lastSub) { subtitleBar.textContent = active.text; _lastSub = active.text; }
    if (subtitleBar.style.opacity !== '1') subtitleBar.style.opacity = '1';
  } else { if (subtitleBar.style.opacity !== '0') subtitleBar.style.opacity = '0'; }
}
const sceneEl = document.querySelector('.scene');
const totalFrames = Math.round(parseFloat(sceneEl.dataset.duration) * FPS);
function easeOut(t) { return 1 - Math.pow(1 - Math.min(1, Math.max(0, t)), 3); }
function renderFrame(frame) {
  updateSubtitle(frame / FPS);
  let op = 1;
  if (frame < SCENE_FADE_FRAMES) op = easeOut(frame / SCENE_FADE_FRAMES);
  else if (frame > totalFrames - SCENE_FADE_FRAMES) op = easeOut((totalFrames - frame) / SCENE_FADE_FRAMES);
  sceneEl.style.opacity = op;
  sceneEl.querySelectorAll('.anim').forEach(an => {
    const dly = Math.round(parseFloat(an.dataset.delay) * FPS);
    const du = Math.round(parseFloat(an.dataset.dur) * FPS);
    if (frame < dly) { an.style.opacity = '0'; an.style.transform = 'translateY(30px)'; }
    else if (frame < dly + du) { const p = (frame - dly) / du; const e = easeOut(p); an.style.opacity = e; an.style.transform = 'translateY(' + (30*(1-e)) + 'px)'; }
    else { an.style.opacity = '1'; an.style.transform = 'translateY(0)'; }
  });
}
window.__hyperframes = {
  getTotalFrames: () => totalFrames,
  getSceneCount: () => 1,
  getSceneDuration: () => parseFloat(sceneEl.dataset.duration),
  gotoFrame: (frame) => renderFrame(Math.max(0, Math.min(frame, totalFrames - 1)))
};
function gotoScene(delta) {
  const next = SCENE_ID + delta;
  if (next < 1 || next > SCENE_TOTAL) return;
  location.href = 'scene-' + next + '.html';
}
let _f = 0; let _playing = false; let _iv = null;
const vo = document.getElementById('vo');
function playPreview() {
  if (_playing) { clearInterval(_iv); _playing = false; vo.pause(); return; }
  _playing = true; _f = 0;
  vo.currentTime = 0; vo.play().catch(function(){});
  _iv = setInterval(function () { _f = _f + 1; if (_f >= totalFrames) { clearInterval(_iv); _playing = false; gotoScene(1); return; } renderFrame(_f); }, 1000 / FPS);
}
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); playPreview(); }
  else if (e.code === 'ArrowRight') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(1); }
  else if (e.code === 'ArrowLeft') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(-1); }
  else if (e.code === 'ArrowUp') { e.preventDefault(); _f = Math.min(_f + 1, totalFrames - 1); renderFrame(_f); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); _f = Math.max(_f - 1, 0); renderFrame(_f); }
  else if (e.code === 'Home') { _f = 0; renderFrame(_f); }
  else if (e.code === 'End') { _f = totalFrames - 1; renderFrame(_f); }
});
renderFrame(0);
</script>
</body>
</html>
