<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>AI 创作全过程 - 从提示词到成品视频 - 场景4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0f0c29; -webkit-font-smoothing: antialiased;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0f0c29;
  -webkit-font-smoothing: antialiased;
}

/* ===== 安全区域参考线 ===== */
.safe-zone {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none;
  z-index: 9999;
  border-top: 180px solid rgba(255,0,0,0.06);
  border-bottom: 300px solid rgba(255,0,0,0.06);
}

/* ===== 字幕条 (内置,截图时直接捕获) ===== */
.subtitle-bar {
  position: absolute;
  left: 60px; right: 60px;
  bottom: 100px;
  min-height: 80px;
  padding: 18px 32px;
  background: rgba(0, 0, 0, 0.72);
  border-radius: 14px;
  color: #ffffff;
  font-size: 42px;
  font-weight: 600;
  line-height: 1.4;
  text-align: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: pre-line;
  word-break: break-word;
  box-sizing: border-box;
  transition: opacity 0.12s linear;
}

/* ===== 场景容器 ===== */
.scene { /* shown by default */ }

.anim {
  opacity: 0;
  transform: translateY(30px);
}

/* ===== 场景1: 开场Hook ===== */
#scene-1 {
  justify-content: flex-start;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  padding-top: 320px;
}
.chat-bubble {
  width: 780px;
  padding: 35px 45px;
  background: rgba(0,255,136,0.06);
  border: 2px solid rgba(0,255,136,0.3);
  border-radius: 20px 20px 20px 4px;
  position: relative;
}
.chat-label {
  font-size: 26px;
  color: #00ff88;
  font-weight: bold;
  margin-bottom: 15px;
  font-family: "Consolas", monospace;
}
.chat-text {
  font-size: 34px;
  color: #e6e6e6;
  line-height: 1.8;
}
.s1-title {
  font-size: 64px;
  color: #ffffff;
  font-weight: bold;
  margin-top: 80px;
  text-align: center;
  line-height: 1.5;
}
.s1-title .green { color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
.s1-badge {
  margin-top: 50px;
  padding: 16px 50px;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  border-radius: 40px;
  font-size: 36px;
  color: #00ff88;
  font-weight: bold;
}

/* ===== 场景2: 用户输入 ===== */
#scene-2 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding-top: 220px;
}
.scene-title {
  font-size: 56px;
  color: #ffffff;
  font-weight: bold;
  text-align: center;
  margin-bottom: 50px;
}
.editor-box {
  width: 880px;
  background: #0d1117;
  border-radius: 16px;
  border: 2px solid #333;
  overflow: hidden;
}
.editor-titlebar {
  height: 50px;
  background: #161b22;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
}
.editor-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
}
.editor-dot.red { background: #ff5f57; }
.editor-dot.yellow { background: #ffbd2e; }
.editor-dot.green { background: #28ca42; }
.editor-content {
  padding: 30px 35px;
  font-family: "Consolas", "JetBrains Mono", monospace;
  font-size: 28px;
  color: #e6e6e6;
  line-height: 2;
}
.editor-content .prompt { color: #00ff88; }
.editor-content .cursor {
  display: inline-block;
  width: 2px; height: 28px;
  background: #00ff88;
  vertical-align: middle;
  margin-left: 5px;
}
.analysis-cards {
  width: 880px;
  display: flex;
  gap: 20px;
  margin-top: 40px;
}
.analysis-card {
  flex: 1;
  padding: 25px;
  background: rgba(0,255,136,0.06);
  border: 2px solid rgba(0,255,136,0.2);
  border-radius: 16px;
  text-align: center;
}
.analysis-icon { font-size: 40px; margin-bottom: 10px; }
.analysis-label { font-size: 26px; color: #cccccc; margin-bottom: 8px; }
.analysis-value { font-size: 30px; color: #00ff88; font-weight: bold; }

/* ===== 场景3: AI思考过程 ===== */
#scene-3 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #0f3460);
  padding-top: 220px;
}
.thinking-tree {
  width: 880px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.think-node {
  display: flex;
  align-items: center;
  padding: 25px 35px;
  background: #0f0c29;
  border: 2px solid #333;
  border-radius: 16px;
  margin-bottom: 10px;
}
.think-node.active {
  border-color: #00ff88;
  background: rgba(0,255,136,0.06);
}
.think-icon {
  font-size: 36px;
  margin-right: 20px;
  flex-shrink: 0;
}
.think-content { flex: 1; }
.think-title { font-size: 32px; color: #ffffff; font-weight: bold; margin-bottom: 8px; }
.think-desc { font-size: 26px; color: #cccccc; }
.think-connector {
  width: 3px; height: 15px;
  background: #00ff88;
  margin-left: 55px;
  margin-bottom: 10px;
}
.formula-card {
  width: 880px;
  margin-top: 30px;
  padding: 25px 35px;
  background: rgba(0,255,136,0.05);
  border: 2px solid rgba(0,255,136,0.2);
  border-radius: 16px;
  text-align: center;
  font-family: "Consolas", monospace;
  font-size: 28px;
  color: #e6e6e6;
  line-height: 2;
}
.formula-card .green { color: #00ff88; font-weight: bold; }

/* ===== 场景4: 代码生成 ===== */
#scene-4 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #302b63);
  padding-top: 220px;
}
.code-block {
  width: 880px;
  background: #0d1117;
  border-radius: 16px;
  border: 2px solid #333;
  overflow: hidden;
}
.code-header {
  height: 45px;
  background: #161b22;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 22px;
  color: #888;
  font-family: "Consolas", monospace;
}
.code-body {
  padding: 25px 30px;
  font-family: "Consolas", "JetBrains Mono", monospace;
  font-size: 24px;
  line-height: 2;
  color: #cccccc;
}
.code-body .keyword { color: #ff7b72; }
.code-body .string { color: #a5d6ff; }
.code-body .value { color: #00ff88; }
.code-body .comment { color: #8b949e; }
.spec-badges {
  width: 880px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-top: 30px;
}
.spec-badge {
  padding: 12px 25px;
  background: rgba(0,255,136,0.08);
  border: 2px solid rgba(0,255,136,0.3);
  border-radius: 30px;
  font-size: 26px;
  color: #00ff88;
  display: flex;
  align-items: center;
  gap: 8px;
}
.spec-badge .check { font-size: 20px; }

/* ===== 场景5: 自动化流水线 ===== */
#scene-5 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding-top: 220px;
}
.pipeline-list {
  width: 880px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.pipe-step {
  display: flex;
  align-items: center;
  padding: 30px 35px;
  background: #0f0c29;
  border: 2px solid #333;
  border-radius: 16px;
}
.pipe-step.done {
  border-color: #00ff88;
  background: rgba(0,255,136,0.06);
}
.pipe-num {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: #00ff88;
  color: #0f0c29;
  font-size: 26px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 25px;
  flex-shrink: 0;
}
.pipe-info { flex: 1; }
.pipe-name { font-size: 32px; color: #ffffff; font-weight: bold; margin-bottom: 6px; }
.pipe-detail { font-size: 26px; color: #cccccc; }
.pipe-time {
  font-size: 28px;
  color: #00ff88;
  font-weight: bold;
  flex-shrink: 0;
}

/* ===== 场景6: 验证输出 ===== */
#scene-6 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #0f3460);
  padding-top: 220px;
}
.check-list {
  width: 880px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.check-item {
  display: flex;
  align-items: center;
  padding: 28px 35px;
  background: #0f0c29;
  border: 2px solid #333;
  border-radius: 16px;
}
.check-item.passed {
  border-color: #00ff88;
  background: rgba(0,255,136,0.06);
}
.check-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #00ff88;
  color: #0f0c29;
  font-size: 24px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 20px;
  flex-shrink: 0;
}
.check-text { font-size: 30px; color: #e6e6e6; flex: 1; }
.check-status { font-size: 26px; color: #00ff88; font-weight: bold; }
.output-card {
  width: 880px;
  margin-top: 40px;
  padding: 30px;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  border-radius: 16px;
  text-align: center;
  font-size: 34px;
  color: #00ff88;
  font-weight: bold;
}

/* ===== 场景7: 结尾CTA ===== */
#scene-7 {
  justify-content: flex-start;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  padding-top: 300px;
}
.ending-logo {
  font-size: 44px;
  color: #00ff88;
  font-weight: bold;
  font-family: "Consolas", monospace;
  padding: 20px 45px;
  border: 3px solid #00ff88;
  border-radius: 16px;
  background: rgba(0,255,136,0.08);
  text-shadow: 0 0 20px rgba(0,255,136,0.4);
}
.ending-title {
  font-size: 60px;
  color: #ffffff;
  font-weight: bold;
  text-align: center;
  margin-top: 60px;
  line-height: 1.5;
}
.ending-tags {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 50px;
  width: 880px;
}
.ending-tag {
  padding: 12px 28px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #444;
  border-radius: 30px;
  font-size: 26px;
  color: #cccccc;
}
.ending-cta {
  margin-top: 60px;
  padding: 25px 60px;
  background: #00ff88;
  border-radius: 40px;
  font-size: 36px;
  color: #0f0c29;
  font-weight: bold;
}

.scene {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px; opacity: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.anim { opacity: 0; transform: translateY(30px); }
.subtitle-bar {
  position: absolute; left: 60px; right: 60px; bottom: 100px;
  min-height: 80px; padding: 18px 32px;
  background: rgba(0,0,0,0.72); border-radius: 14px;
  color: #ffffff; font-size: 42px; font-weight: 600; line-height: 1.4;
  text-align: center; z-index: 9999; opacity: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  white-space: pre-line; word-break: break-word; box-sizing: border-box;
  transition: opacity 0.12s linear;
}
.debug-hint {
  position: absolute; top: 12px; left: 12px; z-index: 10000;
  font-size: 20px; color: #00ff88; background: rgba(0,0,0,0.5);
  padding: 6px 12px; border-radius: 8px; pointer-events: none;
}
</style>
</head>
<body>
<div class="debug-hint">场景 4/7 | ← → 切换 | 空格播放配音</div>
<div id="subtitle-bar" class="subtitle-bar"></div>
<audio id="vo" src="voiceover_scene_4.mp3" preload="auto"></audio>
<div id="scene-4" class="scene" data-duration="8.0">
  <div class="anim scene-title" data-delay="0" data-dur="0.5">
    AI 生成代码
  </div>
  <div class="anim code-block" data-delay="0.4" data-dur="0.5">
    <div class="code-header">video.html — CSS 规范</div>
    <div class="code-body">
      <span class="keyword">body</span> {<br>
      &nbsp;&nbsp;background: <span class="value">#0f0c29</span>;<br>
      &nbsp;&nbsp;width: <span class="value">1080px</span>;<br>
      &nbsp;&nbsp;height: <span class="value">1920px</span>;<br>
      }<br>
      <span class="comment">/* 对比度 ≥ 12:1 */</span><br>
      <span class="keyword">.text</span> { color: <span class="value">#cccccc</span>; }
    </div>
  </div>
  <div class="anim spec-badges" data-delay="1.2" data-dur="0.5">
    <div class="spec-badge"><span class="check">✓</span> 深色主题</div>
    <div class="spec-badge"><span class="check">✓</span> 帧驱动动画</div>
    <div class="spec-badge"><span class="check">✓</span> 安全区域</div>
    <div class="spec-badge"><span class="check">✓</span> 对比度达标</div>
  </div>
</div>
<script>
const FPS = 30;
const SCENE_FADE_FRAMES = 8;
const SCENE_ID = 4;
const SCENE_TOTAL = 7;
const SUBTITLES = [
  {
    "start": 0.3,
    "end": 4.1,
    "text": "AIèªå¨çæä»£ç ï¼æ·±è²ä¸»é¢CSSã\nå¸§é©±å¨å¨ç»ãå®å¨åºåéé"
  },
  {
    "start": 4.3,
    "end": 7.7,
    "text": "æ¯ä¸è¡é½ç¬¦åè§é¢å¶ä½è§è"
  }
];
const subtitleBar = document.getElementById('subtitle-bar');
let _lastSub = null;
function updateSubtitle(time) {
  let active = null;
  for (const sub of SUBTITLES) { if (time >= sub.start && time < sub.end) { active = sub; break; } }
  if (active) {
    if (active.text !== _lastSub) { subtitleBar.textContent = active.text; _lastSub = active.text; }
    if (subtitleBar.style.opacity !== '1') subtitleBar.style.opacity = '1';
  } else { if (subtitleBar.style.opacity !== '0') subtitleBar.style.opacity = '0'; }
}
const sceneEl = document.querySelector('.scene');
const totalFrames = Math.round(parseFloat(sceneEl.dataset.duration) * FPS);
function easeOut(t) { return 1 - Math.pow(1 - Math.min(1, Math.max(0, t)), 3); }
function renderFrame(frame) {
  updateSubtitle(frame / FPS);
  let op = 1;
  if (frame < SCENE_FADE_FRAMES) op = easeOut(frame / SCENE_FADE_FRAMES);
  else if (frame > totalFrames - SCENE_FADE_FRAMES) op = easeOut((totalFrames - frame) / SCENE_FADE_FRAMES);
  sceneEl.style.opacity = op;
  sceneEl.querySelectorAll('.anim').forEach(an => {
    const dly = Math.round(parseFloat(an.dataset.delay) * FPS);
    const du = Math.round(parseFloat(an.dataset.dur) * FPS);
    if (frame < dly) { an.style.opacity = '0'; an.style.transform = 'translateY(30px)'; }
    else if (frame < dly + du) { const p = (frame - dly) / du; const e = easeOut(p); an.style.opacity = e; an.style.transform = 'translateY(' + (30*(1-e)) + 'px)'; }
    else { an.style.opacity = '1'; an.style.transform = 'translateY(0)'; }
  });
}
window.__hyperframes = {
  getTotalFrames: () => totalFrames,
  getSceneCount: () => 1,
  getSceneDuration: () => parseFloat(sceneEl.dataset.duration),
  gotoFrame: (frame) => renderFrame(Math.max(0, Math.min(frame, totalFrames - 1)))
};
function gotoScene(delta) {
  const next = SCENE_ID + delta;
  if (next < 1 || next > SCENE_TOTAL) return;
  location.href = 'scene-' + next + '.html';
}
let _f = 0; let _playing = false; let _iv = null;
const vo = document.getElementById('vo');
function playPreview() {
  if (_playing) { clearInterval(_iv); _playing = false; vo.pause(); return; }
  _playing = true; _f = 0;
  vo.currentTime = 0; vo.play().catch(function(){});
  _iv = setInterval(function () { _f = _f + 1; if (_f >= totalFrames) { clearInterval(_iv); _playing = false; gotoScene(1); return; } renderFrame(_f); }, 1000 / FPS);
}
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); playPreview(); }
  else if (e.code === 'ArrowRight') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(1); }
  else if (e.code === 'ArrowLeft') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(-1); }
  else if (e.code === 'ArrowUp') { e.preventDefault(); _f = Math.min(_f + 1, totalFrames - 1); renderFrame(_f); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); _f = Math.max(_f - 1, 0); renderFrame(_f); }
  else if (e.code === 'Home') { _f = 0; renderFrame(_f); }
  else if (e.code === 'End') { _f = totalFrames - 1; renderFrame(_f); }
});
renderFrame(0);
</script>
