<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>HTML Video Creator - 技能介绍 - 场景7</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0f0c29; -webkit-font-smoothing: antialiased;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #0f0c29;
  -webkit-font-smoothing: antialiased;
}

/* ===== 安全区域参考线 ===== */
.safe-zone {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px;
  pointer-events: none;
  z-index: 9999;
  border-top: 180px solid rgba(255,0,0,0.06);
  border-bottom: 300px solid rgba(255,0,0,0.06);
}

/* ===== 场景容器 ===== */
.scene { /* shown by default */ }

.anim {
  opacity: 0;
  transform: translateY(30px);
}

/* ===== 字幕条 (内置,截图时直接捕获) ===== */
.subtitle-bar {
  position: absolute;
  left: 60px; right: 60px;
  bottom: 100px;
  min-height: 80px;
  padding: 18px 32px;
  background: rgba(0, 0, 0, 0.72);
  border-radius: 14px;
  color: #ffffff;
  font-size: 42px;
  font-weight: 600;
  line-height: 1.4;
  text-align: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: pre-line;
  word-break: break-word;
  box-sizing: border-box;
  transition: opacity 0.12s linear;
}

/* ===== 场景1: 开场Hook ===== */
#scene-1 {
  justify-content: flex-start;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  padding-top: 350px;
}
.code-ring {
  width: 240px; height: 240px;
  border-radius: 50%;
  background: rgba(0,255,136,0.08);
  border: 3px solid rgba(0,255,136,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.code-ring::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 70%);
}
.code-ring-text {
  font-size: 90px;
  color: #00ff88;
  text-shadow: 0 0 30px rgba(0,255,136,0.6);
  font-weight: bold;
  font-family: "Consolas", monospace;
}
.s1-title {
  font-size: 68px;
  color: #ffffff;
  font-weight: bold;
  margin-top: 70px;
  text-align: center;
  line-height: 1.5;
}
.s1-title .green { color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
.s1-badge {
  margin-top: 50px;
  padding: 16px 50px;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  border-radius: 40px;
  font-size: 36px;
  color: #00ff88;
  font-weight: bold;
}

/* ===== 场景2: 痛点 ===== */
#scene-2 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding-top: 220px;
}
.scene-title {
  font-size: 56px;
  color: #ffffff;
  font-weight: bold;
  text-align: center;
  margin-bottom: 50px;
}
.pain-list {
  width: 880px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}
.pain-item {
  display: flex;
  align-items: center;
  padding: 30px 40px;
  background: rgba(255,85,85,0.08);
  border: 2px solid rgba(255,85,85,0.3);
  border-radius: 16px;
}
.pain-icon {
  font-size: 50px;
  margin-right: 30px;
  flex-shrink: 0;
}
.pain-text {
  font-size: 34px;
  color: #e6e6e6;
  line-height: 1.6;
}
.pain-text .red { color: #ff5555; font-weight: bold; }
.time-compare {
  width: 880px;
  margin-top: 40px;
  padding: 30px;
  background: rgba(255,85,85,0.15);
  border: 3px solid #ff5555;
  border-radius: 20px;
  text-align: center;
  font-size: 40px;
  color: #ffffff;
  font-weight: bold;
}

/* ===== 场景3: 解决方案 ===== */
#scene-3 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #0f3460);
  padding-top: 220px;
}
.solution-flow {
  width: 880px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}
.solution-box {
  padding: 30px;
  background: #0f0c29;
  border: 2px solid #333;
  border-radius: 16px;
  text-align: center;
  flex: 1;
}
.solution-box-icon { font-size: 60px; margin-bottom: 15px; }
.solution-box-label { font-size: 28px; color: #cccccc; }
.solution-arrow { font-size: 48px; color: #00ff88; }
.feature-cards {
  width: 880px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-top: 50px;
}
.feature-card {
  padding: 30px;
  background: rgba(0,255,136,0.06);
  border: 2px solid rgba(0,255,136,0.2);
  border-radius: 16px;
  text-align: center;
}
.feature-card-title { font-size: 30px; color: #00ff88; font-weight: bold; margin-bottom: 10px; }
.feature-card-desc { font-size: 26px; color: #cccccc; line-height: 1.6; }

/* ===== 场景4: 自动化流水线 ===== */
#scene-4 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #302b63);
  padding-top: 220px;
}
.pipeline {
  width: 880px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.pipeline-step {
  display: flex;
  align-items: center;
  padding: 25px 35px;
  background: #0f0c29;
  border: 2px solid #333;
  border-radius: 16px;
  margin-bottom: 10px;
}
.pipeline-step.active {
  border-color: #00ff88;
  background: rgba(0,255,136,0.06);
}
.pipeline-num {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: #00ff88;
  color: #0f0c29;
  font-size: 28px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 25px;
  flex-shrink: 0;
}
.pipeline-content { flex: 1; }
.pipeline-title { font-size: 32px; color: #ffffff; font-weight: bold; margin-bottom: 8px; }
.pipeline-desc { font-size: 26px; color: #cccccc; }
.pipeline-connector {
  width: 3px; height: 20px;
  background: #00ff88;
  margin-left: 60px;
  margin-bottom: 10px;
}
.pipeline-result {
  width: 880px;
  margin-top: 30px;
  padding: 25px;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  border-radius: 16px;
  text-align: center;
  font-size: 34px;
  color: #00ff88;
  font-weight: bold;
}

/* ===== 场景5: 智能字幕 ===== */
#scene-5 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding-top: 220px;
}
.subtitle-demo {
  width: 880px;
  padding: 40px;
  background: #0f0c29;
  border-radius: 20px;
  border: 2px solid #444;
}
.timeline {
  width: 100%;
  height: 60px;
  background: #1a1a2e;
  border-radius: 10px;
  position: relative;
  margin-bottom: 30px;
}
.timeline-bar {
  position: absolute;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #ffffff;
  font-weight: bold;
}
.timeline-bar:nth-child(1) { left: 0; width: 30%; background: rgba(0,255,136,0.3); }
.timeline-bar:nth-child(2) { left: 32%; width: 35%; background: rgba(255,170,0,0.3); }
.timeline-bar:nth-child(3) { left: 69%; width: 30%; background: rgba(0,136,255,0.3); }
.formula-box {
  margin-top: 30px;
  padding: 25px;
  background: rgba(0,255,136,0.05);
  border: 1px solid #333;
  border-radius: 12px;
  font-family: "Consolas", monospace;
  font-size: 26px;
  color: #e6e6e6;
  text-align: center;
  line-height: 2;
}
.formula-box .green { color: #00ff88; }
.subtitle-features {
  width: 880px;
  display: flex;
  gap: 20px;
  margin-top: 30px;
}
.sub-feature {
  flex: 1;
  padding: 20px;
  background: #1a1a2e;
  border-radius: 12px;
  border: 1px solid #333;
  text-align: center;
}
.sub-feature-icon { font-size: 40px; margin-bottom: 10px; }
.sub-feature-text { font-size: 24px; color: #cccccc; }

/* ===== 场景6: 深色主题 ===== */
#scene-6 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #533483);
  padding-top: 220px;
}
.color-grid {
  width: 880px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}
.color-card {
  padding: 30px;
  border-radius: 16px;
  border: 2px solid #444;
  background: #0f0c29;
}
.color-swatch {
  width: 100%; height: 50px;
  border-radius: 8px;
  margin-bottom: 15px;
}
.color-label { font-size: 28px; color: #ffffff; font-weight: bold; margin-bottom: 8px; }
.color-value { font-size: 24px; color: #cccccc; }
.color-ratio { font-size: 22px; color: #00ff88; margin-top: 5px; }
.safezone-demo {
  width: 880px;
  height: 400px;
  margin-top: 40px;
  background: #0f0c29;
  border-radius: 20px;
  border: 2px solid #444;
  position: relative;
  overflow: hidden;
}
.safezone-top {
  position: absolute; top: 0; left: 0; right: 0;
  height: 80px;
  background: rgba(255,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #ff5555;
  border-bottom: 2px dashed #ff5555;
}
.safezone-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 120px;
  background: rgba(255,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #ff5555;
  border-top: 2px dashed #ff5555;
}
.safezone-content {
  position: absolute;
  top: 80px; bottom: 120px; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: #00ff88;
}

/* ===== 场景7: 多平台 ===== */
#scene-7 {
  justify-content: flex-start;
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding-top: 220px;
}
.platform-grid {
  width: 880px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}
.platform-card {
  padding: 35px;
  background: #0f0c29;
  border-radius: 20px;
  border: 2px solid #333;
  text-align: center;
  position: relative;
}
.platform-icon { font-size: 60px; margin-bottom: 15px; }
.platform-name { font-size: 32px; color: #ffffff; font-weight: bold; margin-bottom: 10px; }
.platform-spec { font-size: 24px; color: #cccccc; line-height: 1.6; }
.platform-check {
  position: absolute;
  top: 15px; right: 15px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #00ff88;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #0f0c29;
  font-weight: bold;
}
.platform-note {
  width: 880px;
  margin-top: 40px;
  padding: 25px 35px;
  background: rgba(0,255,136,0.06);
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 16px;
  font-size: 30px;
  color: #e6e6e6;
  text-align: center;
}

/* ===== 场景8: 结尾 ===== */
#scene-8 {
  justify-content: flex-start;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  padding-top: 300px;
}
.ending-logo {
  font-size: 48px;
  color: #00ff88;
  font-weight: bold;
  font-family: "Consolas", monospace;
  padding: 20px 50px;
  border: 3px solid #00ff88;
  border-radius: 16px;
  background: rgba(0,255,136,0.08);
  text-shadow: 0 0 20px rgba(0,255,136,0.4);
}
.ending-title {
  font-size: 60px;
  color: #ffffff;
  font-weight: bold;
  text-align: center;
  margin-top: 60px;
  line-height: 1.5;
}
.ending-tags {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin-top: 50px;
  width: 880px;
}
.ending-tag {
  padding: 12px 28px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #444;
  border-radius: 30px;
  font-size: 26px;
  color: #cccccc;
}
.ending-cta {
  margin-top: 60px;
  padding: 25px 60px;
  background: #00ff88;
  border-radius: 40px;
  font-size: 36px;
  color: #0f0c29;
  font-weight: bold;
}

.scene {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 1920px; opacity: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.anim { opacity: 0; transform: translateY(30px); }
.subtitle-bar {
  position: absolute; left: 60px; right: 60px; bottom: 100px;
  min-height: 80px; padding: 18px 32px;
  background: rgba(0,0,0,0.72); border-radius: 14px;
  color: #ffffff; font-size: 42px; font-weight: 600; line-height: 1.4;
  text-align: center; z-index: 9999; opacity: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  white-space: pre-line; word-break: break-word; box-sizing: border-box;
  transition: opacity 0.12s linear;
}
.debug-hint {
  position: absolute; top: 12px; left: 12px; z-index: 10000;
  font-size: 20px; color: #00ff88; background: rgba(0,0,0,0.5);
  padding: 6px 12px; border-radius: 8px; pointer-events: none;
}
</style>
</head>
<body>
<div class="debug-hint">场景 7/8 | ← → 切换 | 空格播放配音</div>
<div id="subtitle-bar" class="subtitle-bar"></div>
<audio id="vo" src="voiceover_scene_7.mp3" preload="auto"></audio>
<div id="scene-7" class="scene" data-duration="7.0">
  <div class="anim scene-title" data-delay="0" data-dur="0.5">
    一次制作，多端分发
  </div>
  <div class="anim platform-grid" data-delay="0.4" data-dur="0.5">
    <div class="platform-card">
      <div class="platform-check">✓</div>
      <div class="platform-icon">📱</div>
      <div class="platform-name">抖音</div>
      <div class="platform-spec">1080×1920<br>9:16 竖屏</div>
    </div>
    <div class="platform-card">
      <div class="platform-check">✓</div>
      <div class="platform-icon">💬</div>
      <div class="platform-name">视频号</div>
      <div class="platform-spec">1080×1920<br>9:16 竖屏</div>
    </div>
    <div class="platform-card">
      <div class="platform-check">✓</div>
      <div class="platform-icon">📺</div>
      <div class="platform-name">B站</div>
      <div class="platform-spec">1080×1920<br>竖屏模式</div>
    </div>
    <div class="platform-card">
      <div class="platform-check">✓</div>
      <div class="platform-icon">📕</div>
      <div class="platform-name">小红书</div>
      <div class="platform-spec">1080×1440<br>3:4 裁剪</div>
    </div>
  </div>
  <div class="anim platform-note" data-delay="1.0" data-dur="0.5">
    以抖音为基准设计，其他平台自动兼容 ✅
  </div>
</div>
<script>
const FPS = 30;
const SCENE_FADE_FRAMES = 8;
const SCENE_ID = 7;
const SCENE_TOTAL = 8;
const SUBTITLES = [
  {
    "start": 0.3,
    "end": 3.5,
    "text": "ä¸å¥HTMLééåå¤§å¹³å°ï¼\næé³ç«å±ãè§é¢å·ãBç«ãå°çº¢ä¹¦"
  },
  {
    "start": 3.7,
    "end": 6.7,
    "text": "å®å¨åºåèªå¨å¼å®¹ï¼\nä¸æ¬¡å¶ä½å¤ç«¯åå"
  }
];
const subtitleBar = document.getElementById('subtitle-bar');
let _lastSub = null;
function updateSubtitle(time) {
  let active = null;
  for (const sub of SUBTITLES) { if (time >= sub.start && time < sub.end) { active = sub; break; } }
  if (active) {
    if (active.text !== _lastSub) { subtitleBar.textContent = active.text; _lastSub = active.text; }
    if (subtitleBar.style.opacity !== '1') subtitleBar.style.opacity = '1';
  } else { if (subtitleBar.style.opacity !== '0') subtitleBar.style.opacity = '0'; }
}
const sceneEl = document.querySelector('.scene');
const totalFrames = Math.round(parseFloat(sceneEl.dataset.duration) * FPS);
function easeOut(t) { return 1 - Math.pow(1 - Math.min(1, Math.max(0, t)), 3); }
function renderFrame(frame) {
  updateSubtitle(frame / FPS);
  let op = 1;
  if (frame < SCENE_FADE_FRAMES) op = easeOut(frame / SCENE_FADE_FRAMES);
  else if (frame > totalFrames - SCENE_FADE_FRAMES) op = easeOut((totalFrames - frame) / SCENE_FADE_FRAMES);
  sceneEl.style.opacity = op;
  sceneEl.querySelectorAll('.anim').forEach(an => {
    const dly = Math.round(parseFloat(an.dataset.delay) * FPS);
    const du = Math.round(parseFloat(an.dataset.dur) * FPS);
    if (frame < dly) { an.style.opacity = '0'; an.style.transform = 'translateY(30px)'; }
    else if (frame < dly + du) { const p = (frame - dly) / du; const e = easeOut(p); an.style.opacity = e; an.style.transform = 'translateY(' + (30*(1-e)) + 'px)'; }
    else { an.style.opacity = '1'; an.style.transform = 'translateY(0)'; }
  });
}
window.__hyperframes = {
  getTotalFrames: () => totalFrames,
  getSceneCount: () => 1,
  getSceneDuration: () => parseFloat(sceneEl.dataset.duration),
  gotoFrame: (frame) => renderFrame(Math.max(0, Math.min(frame, totalFrames - 1)))
};
function gotoScene(delta) {
  const next = SCENE_ID + delta;
  if (next < 1 || next > SCENE_TOTAL) return;
  location.href = 'scene-' + next + '.html';
}
let _f = 0; let _playing = false; let _iv = null;
const vo = document.getElementById('vo');
function playPreview() {
  if (_playing) { clearInterval(_iv); _playing = false; vo.pause(); return; }
  _playing = true; _f = 0;
  vo.currentTime = 0; vo.play().catch(function(){});
  _iv = setInterval(function () { _f = _f + 1; if (_f >= totalFrames) { clearInterval(_iv); _playing = false; gotoScene(1); return; } renderFrame(_f); }, 1000 / FPS);
}
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); playPreview(); }
  else if (e.code === 'ArrowRight') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(1); }
  else if (e.code === 'ArrowLeft') { if (_playing) { clearInterval(_iv); _playing = false; } gotoScene(-1); }
  else if (e.code === 'ArrowUp') { e.preventDefault(); _f = Math.min(_f + 1, totalFrames - 1); renderFrame(_f); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); _f = Math.max(_f - 1, 0); renderFrame(_f); }
  else if (e.code === 'Home') { _f = 0; renderFrame(_f); }
  else if (e.code === 'End') { _f = totalFrames - 1; renderFrame(_f); }
});
renderFrame(0);
</script>
